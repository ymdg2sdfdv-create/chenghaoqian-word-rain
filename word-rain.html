<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧠 单词轰炸 · 陈浩谦 30天计划</title>
<style>
:root {
  --bg:#000; --text:#fff; --soft:#cfcfcf; --muted:#777; --dim:#3a3a3a;
  --review:#ff8a34; --new:#43dc86; --line:rgba(255,255,255,.14);
  --font:"SF Pro Display","PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  --en-size:clamp(3.25rem,9vw,7.5rem); --cn-size:clamp(1.55rem,4.5vw,3.35rem);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
body{font-family:var(--font);color:#fff;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{font:inherit}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%;z-index:0}

#atmosphere{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle at 50% 46%,rgba(255,255,255,.035),transparent 34%),radial-gradient(circle at 50% 50%,transparent 45%,rgba(0,0,0,.72) 100%)}
#beatPulse{position:fixed;left:50%;top:50%;z-index:45;width:12vmin;height:12vmin;border:2px solid rgba(255,255,255,.7);border-radius:50%;opacity:0;transform:translate(-50%,-50%) scale(.45);pointer-events:none}
#beatPulse.beat{animation:beatRing .42s cubic-bezier(.17,.84,.32,1)}
#beatPulse.reveal{animation:revealRing .68s cubic-bezier(.17,.84,.32,1)}
@keyframes beatRing{0%{opacity:.8;transform:translate(-50%,-50%) scale(.45)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}
@keyframes revealRing{0%{opacity:.95;transform:translate(-50%,-50%) scale(.55);box-shadow:0 0 24px rgba(255,255,255,.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.25);box-shadow:0 0 90px rgba(255,255,255,0)}}

#hud{position:fixed;top:0;left:0;right:0;z-index:150;display:flex;align-items:center;justify-content:space-between;padding:calc(16px + env(safe-area-inset-top,0px)) max(20px,env(safe-area-inset-right,0px)) 12px max(20px,env(safe-area-inset-left,0px));background:linear-gradient(180deg,rgba(0,0,0,.94),rgba(0,0,0,0));pointer-events:none}
#phaseLabel{min-height:32px;display:flex;align-items:center;color:var(--review);font-size:clamp(.72rem,1.5vw,.88rem);font-weight:850;letter-spacing:.12em;padding:7px 13px;border:1px solid rgba(255,138,52,.28);border-radius:999px;background:rgba(255,138,52,.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
#phaseLabel:empty{visibility:hidden}
#phaseLabel.new{color:var(--new);border-color:rgba(67,220,134,.28);background:rgba(67,220,134,.08)}
#hud .btns{display:flex;gap:8px;pointer-events:auto}
#hud button{width:46px;height:46px;display:grid;place-items:center;border:1px solid var(--line);border-radius:50%;background:rgba(255,255,255,.055);color:#fff;font-size:18px;cursor:pointer;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:transform .16s ease,background .16s ease,border-color .16s ease}
#hud button:active{transform:scale(.9)}
#hud button.muted{color:var(--review);border-color:rgba(255,138,52,.5)}

#central{position:fixed;left:50%;top:48%;z-index:50;width:min(92vw,1200px);transform:translate(-50%,-50%);text-align:center;pointer-events:none;display:none;filter:drop-shadow(0 0 26px rgba(255,255,255,.14))}
#central .en{font-family:"Arial Black","SF Pro Display",var(--font);font-size:var(--en-size);font-weight:950;line-height:1.02;letter-spacing:-.045em;color:#fff;overflow-wrap:anywhere;transition:font-size .28s cubic-bezier(.2,.8,.2,1),opacity .18s ease,transform .28s cubic-bezier(.2,.8,.2,1),letter-spacing .28s ease}
#central .cn{margin-top:.16em;font-size:var(--cn-size);font-weight:900;line-height:1.22;color:#fff;transition:font-size .28s ease,opacity .18s ease,transform .28s ease}
#central.letter .en{animation:letterFocus .34s cubic-bezier(.2,.9,.25,1)}
#central.revealed .en{animation:wordReveal .62s cubic-bezier(.16,.86,.3,1)}
#central.recall .en{opacity:0;transform:translateY(10px) scale(.96)}
#central.recall .cn{font-size:clamp(2rem,6vw,4.5rem);text-shadow:0 0 36px rgba(255,255,255,.26)}
@keyframes letterFocus{0%{opacity:.25;transform:scale(.82);letter-spacing:.03em}100%{opacity:1;transform:scale(1);letter-spacing:-.045em}}
@keyframes wordReveal{0%{opacity:.15;transform:scale(.72);letter-spacing:.03em;text-shadow:0 0 80px #fff}55%{opacity:1;transform:scale(1.06);letter-spacing:-.035em;text-shadow:0 0 38px rgba(255,255,255,.7)}100%{transform:scale(1);letter-spacing:-.045em;text-shadow:0 0 0 transparent}}

#bar{position:fixed;left:0;right:0;bottom:0;z-index:100;padding:26px max(22px,env(safe-area-inset-right,0px)) calc(18px + env(safe-area-inset-bottom,0px)) max(22px,env(safe-area-inset-left,0px));background:linear-gradient(0deg,#000 25%,rgba(0,0,0,.92) 65%,transparent);pointer-events:none}
#bar>*{pointer-events:auto}
#bar .info-row{display:flex;align-items:center;justify-content:space-between;gap:18px;color:var(--muted);font-size:clamp(.7rem,1.5vw,.88rem);font-weight:700;letter-spacing:.035em;margin-bottom:7px}
#bar .word{color:#fff;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#bar .track{height:4px;border-radius:99px;overflow:hidden;background:rgba(255,255,255,.1);margin-bottom:9px}
#bar .fill{height:100%;width:0;border-radius:99px;background:#fff;box-shadow:0 0 14px rgba(255,255,255,.38);transition:width .32s cubic-bezier(.2,.8,.2,1)}
#bar .fill.review{background:var(--review);box-shadow:0 0 14px rgba(255,138,52,.42)}
#bar .fill.new{background:var(--new);box-shadow:0 0 14px rgba(67,220,134,.42)}
#bar .btn-row{display:flex;justify-content:center;margin-top:4px}
#bar button{min-width:124px;min-height:46px;padding:10px 24px;border:1px solid rgba(255,255,255,.2);border-radius:999px;background:rgba(255,255,255,.07);color:#fff;font-size:14px;font-weight:850;letter-spacing:.06em;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .16s ease,background .16s ease}
#bar button:active{transform:scale(.94)}
#bar button.primary{border-color:rgba(67,220,134,.62);background:rgba(67,220,134,.1);color:var(--new)}

.overlay{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;padding:calc(28px + env(safe-area-inset-top,0px)) calc(24px + env(safe-area-inset-right,0px)) calc(28px + env(safe-area-inset-bottom,0px)) calc(24px + env(safe-area-inset-left,0px));background:#000;color:#fff;text-align:center;overflow:auto}
.overlay.show{display:flex;animation:overlayIn .55s ease both}
@keyframes overlayIn{from{opacity:0;transform:scale(1.015)}to{opacity:1;transform:scale(1)}}
.overlay-card{width:min(620px,92vw);display:flex;flex-direction:column;align-items:center}
.eyebrow{font-size:clamp(.68rem,1.6vw,.82rem);font-weight:850;letter-spacing:.28em;color:#8b8b8b;text-transform:uppercase;margin-bottom:18px}
.overlay h1,.overlay h2{font-family:"Arial Black",var(--font);font-size:clamp(2.1rem,6vw,4.4rem);font-weight:950;line-height:1;letter-spacing:-.045em}
.overlay .subtitle{margin-top:10px;font-size:clamp(.8rem,2vw,1rem);font-weight:800;letter-spacing:.18em;color:var(--soft)}
.day-display{display:flex;align-items:flex-end;justify-content:center;margin:clamp(24px,5vh,44px) 0 26px;line-height:.8}
.day-display .day-label{font-size:clamp(.7rem,1.5vw,.85rem);font-weight:900;letter-spacing:.24em;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--muted);margin-right:10px}
.day-display .day-num{font-family:"Arial Black",var(--font);font-size:clamp(5.5rem,17vw,10rem);font-weight:950;letter-spacing:-.09em}
.day-display .day-total{font-size:clamp(1rem,3vw,1.5rem);font-weight:900;color:var(--muted);margin:0 0 5px 10px}
.day-track{width:min(360px,74vw);height:3px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;margin-top:-10px;margin-bottom:26px}
.day-track>span{display:block;height:100%;background:#fff;border-radius:99px}
.stats-row{width:min(460px,88vw);display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.stat{position:relative;padding:18px 16px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035);overflow:hidden}
.stat:before{content:"";position:absolute;left:18px;right:18px;top:0;height:2px;background:currentColor;opacity:.75}
.stat.review{color:var(--review)}.stat.new{color:var(--new)}
.stat .num{font-family:"Arial Black",var(--font);font-size:clamp(2.25rem,7vw,4rem);font-weight:950;line-height:1}
.stat .lbl{margin-top:7px;color:#9b9b9b;font-size:clamp(.7rem,1.8vw,.84rem);font-weight:800;letter-spacing:.08em}
.motto{max-width:430px;min-height:1.7em;margin-bottom:20px;color:#8a8a8a;font-size:clamp(.76rem,1.8vw,.94rem);font-weight:650;line-height:1.7}
.overlay button{min-width:min(330px,82vw);min-height:58px;padding:15px 34px;border:1px solid rgba(255,255,255,.72);border-radius:999px;background:#fff;color:#000;font-size:clamp(1rem,2.3vw,1.18rem);font-weight:950;letter-spacing:.055em;cursor:pointer;box-shadow:0 0 34px rgba(255,255,255,.12);transition:transform .18s ease,box-shadow .18s ease}
.overlay button:active{transform:scale(.96)}
.overlay button.secondary{background:transparent;color:#fff;border-color:rgba(255,255,255,.3);box-shadow:none}
.complete-mark{width:72px;height:72px;display:grid;place-items:center;margin-bottom:24px;border:2px solid #fff;border-radius:50%;font-size:34px;font-weight:950;animation:completePop .7s cubic-bezier(.2,.9,.25,1)}
@keyframes completePop{from{opacity:0;transform:scale(.35) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.complete-total{font-family:"Arial Black",var(--font);font-size:clamp(3.5rem,12vw,7.5rem);font-weight:950;line-height:1;margin:28px 0 8px}
.complete-caption{color:#777;font-size:.8rem;font-weight:800;letter-spacing:.14em;margin-bottom:24px}

/* Welcome: 陈浩谦 30 天高频词表专属蓝白入口 */
#welcomeOverlay{padding:0;background:#f4f9ff;color:#073d82;text-align:left;overflow:hidden}
#welcomeOverlay:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 88% 10%,rgba(61,140,241,.18),transparent 25%),linear-gradient(150deg,transparent 60%,rgba(73,157,255,.14) 60% 73%,rgba(5,73,155,.08) 73%)}
#welcomeContent{position:relative;width:100%;height:100%;display:grid;place-items:center;z-index:1}
#welcomeContent .welcome-card{position:relative;width:min(1180px,94vw);height:min(760px,90vh);min-height:610px;display:block;overflow:hidden;border:2px solid rgba(35,112,210,.48);border-radius:30px;background:linear-gradient(110deg,#fff 0%,#fff 50%,#edf6ff 100%);box-shadow:0 30px 90px rgba(8,55,114,.2)}
#welcomeContent .welcome-card:before{content:"";position:absolute;inset:10px;border:1px solid rgba(44,125,224,.48);border-radius:21px;z-index:5;pointer-events:none}
#welcomeContent .welcome-card:after{content:"";position:absolute;left:-4%;right:35%;bottom:-14%;height:30%;background:linear-gradient(165deg,transparent 0 32%,rgba(51,137,239,.18) 33% 50%,rgba(3,71,151,.94) 51% 100%);transform:rotate(-3deg);pointer-events:none;z-index:1}
.welcome-art{position:absolute;z-index:0;right:-3%;top:0;width:61%;height:100%;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent 0%,rgba(0,0,0,.3) 13%,#000 32%);mask-image:linear-gradient(90deg,transparent 0%,rgba(0,0,0,.3) 13%,#000 32%)}
.welcome-art:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,.98) 24%,rgba(255,255,255,.78) 32%,transparent 46%),linear-gradient(0deg,rgba(4,71,149,.22),transparent 34%)}
.welcome-art img{position:absolute;width:160%;max-width:none;height:auto;right:-10%;top:-58%;filter:saturate(.98) contrast(1.02)}
.welcome-copy{position:relative;z-index:3;width:58%;height:100%;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:42px 22px 42px clamp(48px,6vw,82px)}
#welcomeContent .eyebrow{margin:0 0 14px;color:#1d68bc;font-size:clamp(.65rem,1.05vw,.8rem);letter-spacing:.21em}
#welcomeContent h1{color:#073d82;font-size:clamp(2.35rem,4.8vw,4.65rem);line-height:.96;text-align:left;letter-spacing:-.055em}
#welcomeContent h1 span{display:block;margin-bottom:8px;color:#092f68;font-size:.56em;letter-spacing:.03em}
#welcomeContent .subtitle{margin-top:12px;color:#376ca7;font-size:clamp(.76rem,1.3vw,.98rem);letter-spacing:.15em}
.course-seal{display:flex;align-items:center;gap:9px;margin:20px 0 2px;padding:8px 17px;color:#fff;background:linear-gradient(100deg,#073f8b,#237de5);font-size:clamp(.7rem,1.1vw,.88rem);font-weight:900;letter-spacing:.1em;transform:skew(-4deg);box-shadow:0 8px 22px rgba(15,91,181,.18)}
.course-seal i{width:4px;height:4px;border-radius:50%;background:#fff;opacity:.8}
#welcomeContent .day-display{justify-content:flex-start;margin:18px 0 14px;color:#06387a}
#welcomeContent .day-display .day-label{color:#356da9}
#welcomeContent .day-display .day-num{font-size:clamp(4.7rem,10vw,7.4rem);letter-spacing:-.1em}
#welcomeContent .day-display .day-total{color:#356da9}
#welcomeContent .day-track{width:min(360px,82%);margin:-4px 0 16px;background:rgba(8,64,132,.16)}
#welcomeContent .day-track>span{background:linear-gradient(90deg,#0a4e9f,#358df0)}
#welcomeContent .stats-row{width:min(390px,88%);gap:10px;margin-bottom:14px}
#welcomeContent .stat{padding:12px 14px;border-color:rgba(12,77,153,.18);border-radius:14px;background:rgba(255,255,255,.82);box-shadow:0 8px 24px rgba(17,81,153,.08)}
#welcomeContent .stat .num{font-size:clamp(2rem,4.6vw,3rem)}
#welcomeContent .stat .lbl{color:#507096}
#welcomeContent .motto{max-width:390px;min-height:0;margin:0 0 14px;color:#53759b;font-size:clamp(.72rem,1.2vw,.86rem)}
#welcomeContent button{min-width:min(330px,84%);min-height:54px;border-color:#083f88;background:#083f88;color:#fff;box-shadow:0 12px 30px rgba(7,63,136,.2)}
#welcomeContent button.secondary{border-color:#0a4f9f;background:rgba(255,255,255,.76);color:#084287}
#welcomeContent button.reset-link{display:inline-block;width:auto;min-width:0;min-height:0;margin-top:10px;padding:6px 10px;border:0;border-radius:8px;background:transparent;color:#83a0c1;box-shadow:none;font-size:11px;font-weight:650;line-height:1.4;letter-spacing:0;text-decoration:none;cursor:pointer;opacity:0.88;appearance:none;-webkit-appearance:none}

  #welcomeContent h1{font-size:clamp(2.6rem,9vw,4.5rem)}
  #welcomeContent .day-display{margin:15px 0 10px}
  #welcomeContent .day-display .day-num{font-size:clamp(4.7rem,17vw,7rem)}
  #welcomeContent .stats-row{width:min(430px,100%)}
  #welcomeContent button{min-width:min(360px,100%)}
}
@media (max-width:600px){
  #welcomeContent .welcome-card{height:96vh;min-height:650px;border-radius:22px}
  #welcomeContent .welcome-card:before{inset:7px;border-radius:15px}
  .welcome-copy{height:72%;padding:36px 24px 12px}
  #welcomeContent .eyebrow{font-size:.58rem;letter-spacing:.14em}

<body>

<canvas id="c"></canvas>
<div id="atmosphere"></div>
<div id="beatPulse"></div>

<div id="hud">
  <span id="phaseLabel"></span>
  <div class="btns"><button id="muteBtn" title="静音" aria-label="静音切换">🔊</button></div>
</div>

<div id="central"><div class="en" id="cEN"></div><div class="cn" id="cCN"></div></div>

<div id="bar">
  <div class="info-row"><span class="word" id="curWord">—</span><span id="wordCount">0/0</span></div>
  <div class="track"><div class="fill" id="fill"></div></div>
  <div class="info-row"><span id="stats">准备开始</span><span id="catLabel"></span></div>
  <div class="btn-row"><button id="btnPause" class="primary">暂停</button></div>
</div>

<div class="overlay" id="welcomeOverlay"><div id="welcomeContent"></div></div>
<div class="overlay" id="completeOverlay"><div id="completeContent"></div></div>

<!-- 词库数据（由 build-d30-plan.py 生成） -->
<script src="word-bank-data.js"></script>

<script>
/* ================================================================
   单词轰炸 v4.0 — 陈浩谦 · 30天全自动高频词早读
   ================================================================ */

const $ = id => document.getElementById(id);
const cv = $("c"), ctx = cv.getContext("2d");
const central = $("central"), cEN = $("cEN"), cCN = $("cCN");
const fillBar = $("fill"), statsEl = $("stats"), phaseLabel = $("phaseLabel");
const catLabel = $("catLabel"), muteBtn = $("muteBtn"), beatPulse = $("beatPulse");
const welcomeOverlay = $("welcomeOverlay"), welcomeContent = $("welcomeContent");
const completeOverlay = $("completeOverlay"), completeContent = $("completeContent");

const CONFIG = Object.freeze({
  reviewOffsets: Object.freeze([1, 2, 4, 7, 15]),
  letterMs: 340,
  recallCueMs: 1200,
  revealHoldMs: 220,
  silentFlashMs: 620,
  newWord: Object.freeze({ spellRounds: 3, recallRounds: 2, flashCount: 5 }),
  reviewEarly: Object.freeze({ spellRounds: 1, recallRounds: 1, flashCount: 4 }),
  reviewLate: Object.freeze({ spellRounds: 0, recallRounds: 1, flashCount: 2 }),
});

const ALL_ITEMS = Object.values(D30_PLAN).flat();
const ITEM_BY_ID = new Map(ALL_ITEMS.map(item => [item.id, item]));
const ITEMS_BY_WORD = ALL_ITEMS.reduce((map,item) => {
  if (!map.has(item.word)) map.set(item.word, []);
  map.get(item.word).push(item);
  return map;
}, new Map());

let W = innerWidth, H = innerHeight, DPR = 1;
function resizeCanvas() {
  W = innerWidth; H = innerHeight;
  DPR = Math.min(devicePixelRatio || 1, 3);
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  cv.style.width = W + "px"; cv.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

/* ---------------- Audio: existing files and voices ---------------- */
const AUDIO_BASE = "assets/audio/";
const EN_DIR = AUDIO_BASE + "words-en/", CN_DIR = AUDIO_BASE + "words-cn/";
const FB_DIR = AUDIO_BASE + "feedback/";
const EN_VOICES = ["Samantha","Daniel","Alex","Tom","Fred"];
const CN_VOICES = ["Eddy","Rocko","Reed"];
const safeFn = word => word.replace(/ /g,"-").replace(/\//g,"-").replace(/\\/g,"-");

let audioCtx = null, tickBuffer = null, soundBus = null, currentAudio = null, settleCurrentAudio = null;
let sharedAudio = null;
let voicesCache = [];
let muted = (() => { try { return localStorage.getItem("wordrain_muted") === "1"; } catch (_) { return false; } })();

function loadVoices(){ voicesCache = speechSynthesis?.getVoices?.() || []; }
loadVoices(); if (window.speechSynthesis) speechSynthesis.onvoiceschanged = loadVoices;

function ensureAudio(){
  if (!audioCtx) try { audioCtx = new (AudioContext || webkitAudioContext)(); } catch (_) { return false; }
  if (audioCtx.state === "suspended") audioCtx.resume();
  if (!soundBus) {
    soundBus=audioCtx.createDynamicsCompressor();
    soundBus.threshold.setValueAtTime(-18,audioCtx.currentTime);
    soundBus.knee.setValueAtTime(8,audioCtx.currentTime);
    soundBus.ratio.setValueAtTime(6,audioCtx.currentTime);
    soundBus.attack.setValueAtTime(.003,audioCtx.currentTime);
    soundBus.release.setValueAtTime(.12,audioCtx.currentTime);
    soundBus.connect(audioCtx.destination);
  }
  if (!tickBuffer) {
    const duration = .012;
    tickBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * duration), audioCtx.sampleRate);
    const data = tickBuffer.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*.0012));
  }
  return true;
}

function playSound(kind){
  if (muted || !ensureAudio()) return;
  try {
    const now=audioCtx.currentTime;
    if (kind === "tick") {
      const source=audioCtx.createBufferSource(), gain=audioCtx.createGain(); source.buffer=tickBuffer;
      gain.gain.setValueAtTime(.07,now); gain.gain.exponentialRampToValueAtTime(.001,now+.012);
      source.connect(gain).connect(soundBus); source.start(now); source.stop(now+.014); return;
    }
    if (kind === "beat") {
      const partials=[[1174,.032],[2348,.012]];
      for(const [frequency,volume] of partials){
        const oscillator=audioCtx.createOscillator(),gain=audioCtx.createGain();
        oscillator.type="sine";
        oscillator.frequency.setValueAtTime(frequency*1.025,now);
        oscillator.frequency.exponentialRampToValueAtTime(frequency,now+.045);
        gain.gain.setValueAtTime(.001,now);
        gain.gain.exponentialRampToValueAtTime(volume,now+.004);
        gain.gain.exponentialRampToValueAtTime(.001,now+.065);
        oscillator.connect(gain).connect(soundBus);
        oscillator.start(now);oscillator.stop(now+.075);
      }
      return;
    }
    const table={reveal:[660,1100,.16,.075],correct:[523,1047,.2,.085],finish:[440,880,.3,.085],click:[520,740,.06,.05]};
    const [f0,f1,duration,volume]=table[kind]||table.click;
    const oscillator=audioCtx.createOscillator(), gain=audioCtx.createGain(); oscillator.type="triangle";
    oscillator.frequency.setValueAtTime(f0,now); oscillator.frequency.exponentialRampToValueAtTime(f1,now+duration);
    gain.gain.setValueAtTime(.001,now); gain.gain.exponentialRampToValueAtTime(volume,now+.012); gain.gain.exponentialRampToValueAtTime(.001,now+duration);
    oscillator.connect(gain).connect(soundBus); oscillator.start(now); oscillator.stop(now+duration+.03);
  } catch (_) {}
}

function stopCurrentAudio(){
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime=0; } catch (_) {} }
  currentAudio=null;
  if (settleCurrentAudio) { const settle=settleCurrentAudio; settleCurrentAudio=null; settle(false); }
}

function playFile(url){
  if (muted) return Promise.resolve(false);

  ensureAudio();
  stopCurrentAudio();

  return new Promise(resolve => {
    let settled = false;

    if (!sharedAudio) {
      sharedAudio = new Audio();
      sharedAudio.preload = "auto";
    }

    const audio = sharedAudio;

    const finish = value => {
      if (settled) return;
      settled = true;

      if (currentAudio === audio) currentAudio = null;
      if (settleCurrentAudio === finish) settleCurrentAudio = null;

      resolve(value);
    };

    try {
      audio.onended = null;
      audio.onerror = null;

      currentAudio = audio;
      settleCurrentAudio = finish;

      audio.onended = () => finish(true);

      audio.onerror = () => {
        console.warn(
          "[audio] load failed",
          url,
          audio.error?.code || "unknown"
        );
        finish(false);
      };

      audio.src = url;
      audio.load();

      const promise = audio.play();

      if (promise) {
        promise.catch(error => {
          console.warn(
            "[audio] play failed",
            url,
            error?.name || "unknown",
            error?.message || ""
          );
          finish(false);
        });
      }
    } catch (error) {
      console.warn(
        "[audio] exception",
        url,
        error?.name || "unknown",
        error?.message || ""
      );
      finish(false);
    }
  });
}

function pickVoice(lang, whitelist){
  for (const name of whitelist) { const voice=voicesCache.find(v=>v.name===name&&v.lang.startsWith(lang)); if(voice)return voice; }
  return lang === "zh" ? null : voicesCache.find(v=>v.lang.startsWith(lang)) || null;
}

function fallbackTTS(text,lang){
  if (muted || !speechSynthesis) return Promise.resolve(false);
  loadVoices();
  return new Promise(resolve => {
    try {
      const isCN=lang.startsWith("zh"), voice=pickVoice(isCN?"zh":"en",isCN?CN_VOICES:EN_VOICES);
      if (isCN && !voice) { resolve(false); return; }
      const utterance=new SpeechSynthesisUtterance(String(text).replace(/[{}]/g,""));
      utterance.lang=isCN?"zh-CN":"en-US"; if(voice)utterance.voice=voice;
      utterance.rate=.92; utterance.pitch=1; utterance.volume=.9;
      utterance.onend=()=>resolve(true); utterance.onerror=()=>resolve(false);
      speechSynthesis.cancel(); speechSynthesis.speak(utterance);
    } catch (_) { resolve(false); }
  });
}

async function speak(text,lang,singleChar=false,key=text){
  if (muted) return false;
  if (singleChar) { fallbackTTS(text,lang); return true; }
  const directory=lang.startsWith("zh")?CN_DIR:EN_DIR;
  const ok=await playFile(directory+safeFn(key)+".mp3");
  return ok || fallbackTTS(text,lang);
}
const speakEN=(text,single=false)=>speak(text,"en-US",single,text);
const speakCN=item=>speak(item.cn,"zh-CN",false,item.word);
const playFeedback=name=>playFile(FB_DIR+name);

function stopSpeech(){ stopCurrentAudio(); try { speechSynthesis?.cancel(); } catch (_) {} }
function pauseSpeech(){ if(currentAudio&&!currentAudio.paused)try{currentAudio.pause();}catch(_){} }
function resumeSpeech(){ if(currentAudio&&currentAudio.paused)try{currentAudio.play().catch(()=>{});}catch(_){} }
function setMuted(value){
  muted=value; try{localStorage.setItem("wordrain_muted",value?"1":"0");}catch(_){}
  muteBtn.textContent=value?"🔇":"🔊"; muteBtn.classList.toggle("muted",value); if(value)stopSpeech();
}
setMuted(muted);

/* ---------------- Versioned progress and strict review ---------------- */
const STORE_KEY="wordrain_v2";
function localDateString(date=new Date()){
  const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,"0"),d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function getToday(){
  const test=new URLSearchParams(location.search).get("testDate");
  return /^\d{4}-\d{2}-\d{2}$/.test(test||"")?test:localDateString();
}
function addDays(dateString,days){ const [y,m,d]=dateString.split("-").map(Number),date=new Date(y,m-1,d+days); return localDateString(date); }

function emptyStore(){ return {version:2,courseDay:1,lastAdvancedDate:null,entries:{},dayCompletion:{}}; }
function migrateLegacy(){
  const next=emptyStore();
  try { next.courseDay=Math.min(30,Math.max(1,parseInt(localStorage.getItem("wordrain_day")||"1",10))); } catch (_) {}
  let legacy={}; try{legacy=JSON.parse(localStorage.getItem("wordrain_sr")||"{}");}catch(_){}
  for(const [word,record] of Object.entries(legacy)){
    const matches=ITEMS_BY_WORD.get(word)||[];
    if(matches.length!==1)continue;
    const item=matches[0],learnedDate=record.learnedDate||getToday();
    const reviewCount=Math.min((record.reviews||[]).length,CONFIG.reviewOffsets.length);
    const completedReviewOffsets=CONFIG.reviewOffsets.slice(0,reviewCount);
    const nextReviewOffset=CONFIG.reviewOffsets[reviewCount]??null;
    next.entries[item.id]={word:item.word,courseDay:item.day,learnedDate,completedReviewOffsets,nextReviewOffset,nextReviewDate:nextReviewOffset?addDays(learnedDate,nextReviewOffset):null};
  }
  return next;
}
function loadStore(){
  const raw=localStorage.getItem(STORE_KEY);
  if(!raw){const migrated=migrateLegacy();saveStore(migrated);return migrated;}
  try{
    const parsed=JSON.parse(raw);
    if(parsed.version!==2||!parsed.entries||!parsed.dayCompletion)throw new Error("invalid schema");
    parsed.courseDay=Math.min(30,Math.max(1,Number(parsed.courseDay)||1)); return parsed;
  }catch(_){try{localStorage.setItem(`${STORE_KEY}_corrupt_${Date.now()}`,raw);}catch(__){} const fresh=emptyStore();saveStore(fresh);return fresh;}
}
function saveStore(value=progress){try{localStorage.setItem(STORE_KEY,JSON.stringify(value));}catch(_){} }
let progress=loadStore();

function syncCourseDay(){
  const today=getToday(); let day=progress.courseDay;
  while(day<30&&progress.dayCompletion[String(day)]&&progress.dayCompletion[String(day)]<today)day++;
  if(day!==progress.courseDay){progress.courseDay=day;progress.lastAdvancedDate=today;saveStore();}
}
function markLearned(item){
  if(progress.entries[item.id])return;
  const learnedDate=getToday(),nextReviewOffset=CONFIG.reviewOffsets[0];
  progress.entries[item.id]={word:item.word,courseDay:item.day,learnedDate,completedReviewOffsets:[],nextReviewOffset,nextReviewDate:addDays(learnedDate,nextReviewOffset)};
  saveStore();
}
function markReviewed(item){
  const record=progress.entries[item.id]; if(!record||record.nextReviewOffset==null)return;
  const current=record.nextReviewOffset;
  if(!record.completedReviewOffsets.includes(current))record.completedReviewOffsets.push(current);
  const index=CONFIG.reviewOffsets.indexOf(current),next=CONFIG.reviewOffsets[index+1]??null;
  record.nextReviewOffset=next; record.nextReviewDate=next?addDays(record.learnedDate,next):null; saveStore();
}
function dueReviews(){
  const today=getToday();
  return Object.entries(progress.entries).filter(([,r])=>r.nextReviewDate&&r.nextReviewDate<=today).map(([id,r])=>({item:ITEM_BY_ID.get(id),kind:"review",offset:r.nextReviewOffset,dueDate:r.nextReviewDate})).filter(x=>x.item).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)||a.item.day-b.item.day||a.item.order-b.item.order);
}

/* ---------------- Session ---------------- */
let state={active:false,runToken:0,pauseWaiters:[],queue:[],queueIdx:0,reviewCount:0,newCount:0,completedReview:0,completedNew:0,completedRedo:0,current:null,instances:[],pinned:[],rapidBoxes:[],mode:"normal",stageText:"",prePauseStage:""};

function buildSession(mode="normal"){
  syncCourseDay(); const day=progress.courseDay;
  const reviews=mode==="normal"?dueReviews():[];
  const newItems=mode==="redo"?(D30_PLAN[day]||[]).map(item=>({item,kind:"redo",offset:null})):(D30_PLAN[day]||[]).filter(item=>!progress.entries[item.id]).map(item=>({item,kind:"new",offset:null}));
  state.queue=[...reviews,...newItems]; state.queueIdx=0; state.reviewCount=reviews.length; state.newCount=newItems.length;
  state.completedReview=0;state.completedNew=0;state.completedRedo=0;state.mode=mode;
}

function gate(token){
  if(token!==state.runToken)return Promise.resolve(false);
  if(state.active)return Promise.resolve(true);
  return new Promise(resolve=>state.pauseWaiters.push(()=>resolve(token===state.runToken&&state.active)));
}
async function stepDelay(ms,token){await new Promise(resolve=>setTimeout(resolve,ms));return gate(token);}
function invalidateRun(){state.runToken++;state.active=false;state.pauseWaiters.splice(0).forEach(fn=>fn());stopSpeech();}

function itemConfig(entry){
  if(entry.kind==="new")return CONFIG.newWord;
  if(entry.kind==="redo")return CONFIG.reviewEarly;
  return entry.offset<=2?CONFIG.reviewEarly:CONFIG.reviewLate;
}
function catMeta(item){return CAT_META[item.cat]||{label:"",emoji:""};}

function updateHeader(entry){
  const isNew=entry.kind==="new";
  phaseLabel.className=isNew?"new":"";
  if(entry.kind==="review")phaseLabel.textContent=`复习 · +${entry.offset}天  ${state.completedReview+1}/${state.reviewCount}`;
  else if(isNew)phaseLabel.textContent=`新词 · DAY ${progress.courseDay}  ${state.completedNew+1}/${state.newCount}`;
  else phaseLabel.textContent=`今日重温  ${state.completedRedo+1}/${state.queue.length}`;
  fillBar.className=`fill ${isNew?"new":"review"}`;
  $("curWord").textContent=entry.item.word; $("wordCount").textContent=`${state.queueIdx+1}/${state.queue.length}`;
  catLabel.textContent=catMeta(entry.item).label;
}
function updateOverallProgress(){fillBar.style.width=(state.queue.length?state.queueIdx/state.queue.length*100:0)+"%";}
function updateStage(text){state.stageText=text;statsEl.textContent=text;}

function setCentralSizes(item,large=false){
  const length=Math.max(4,item.word.length),available=W*.86;
  const en=Math.max(W<600?42:54,Math.min(large?124:104,available/(length*.59)));
  const cnLength=Math.max(4,item.cn.length),cn=Math.max(24,Math.min(large?56:48,W*.78/(cnLength*.92)));
  central.style.setProperty("--en-size",`${en}px`); central.style.setProperty("--cn-size",`${cn}px`);
}
function animateCentral(className){central.className="";void central.offsetWidth;central.classList.add(className);}
function visualPulse(kind="beat"){
  beatPulse.className="";void beatPulse.offsetWidth;beatPulse.classList.add(kind);
}
function showLetters(item,text){
  central.style.display="block";setCentralSizes(item);cEN.textContent=text;cCN.textContent="";animateCentral("letter");visualPulse("beat");
}
function revealItem(item){
  central.style.display="block";setCentralSizes(item,true);cEN.textContent=item.word;cCN.textContent=item.cn;animateCentral("revealed");visualPulse("reveal");spawnBurst(W/2,H*.48,14);
}
function showRecallCue(item){
  central.style.display="block";setCentralSizes(item,true);cEN.textContent=item.word;cCN.textContent=item.cn;animateCentral("recall");visualPulse("beat");
}

async function playReveal(item,token){
  playSound("reveal"); revealItem(item);
  await speakEN(item.word); if(!(await gate(token)))return false;
  if(!(await stepDelay(CONFIG.revealHoldMs,token)))return false;
  await speakCN(item); return gate(token);
}

async function runSpellRounds(item,rounds,token){
  state.pinned=[];
  for(let round=0;round<rounds;round++){
    const letters=[...item.word];
    for(let i=0;i<letters.length;i++){
      if(!(await gate(token)))return false;
      showLetters(item,letters.slice(0,i+1).join(""));playSound("beat");speakEN(letters[i],true);
      if(!(await stepDelay(CONFIG.letterMs,token)))return false;
    }
    if(!(await playReveal(item,token)))return false;
    state.pinned.push(round+1);rebuildPinned(item,rounds);
  }
  return true;
}

async function runRecallRounds(item,rounds,token){
  for(let round=0;round<rounds;round++){
    if(!(await gate(token)))return false;
    updateStage(`回忆英文 ${round+1}/${rounds}`);showRecallCue(item);
    if(!(await stepDelay(CONFIG.recallCueMs,token)))return false;
    if(!(await playReveal(item,token)))return false;
  }
  return true;
}

async function runRapid(item,count,token){
  central.style.display="none";state.rapidBoxes=[];updateStage(`快速识别 0/${count}`);
  for(let i=0;i<count;i++){
    if(!(await gate(token)))return false;
    spawnRapidVisual(item,i,count);playSound("tick");visualPulse("beat");updateStage(`快速识别 ${i+1}/${count}`);
    const spoken=await speakEN(item.word);
    if(!(await gate(token)))return false;
    if(!spoken&&!(await stepDelay(CONFIG.silentFlashMs,token)))return false;
  }
  return true;
}

async function runCurrentItem(token){
  const entry=state.current,item=entry.item,config=itemConfig(entry);
  state.instances=[];state.pinned=[];state.rapidBoxes=[];updateHeader(entry);updateOverallProgress();
  updateStage(config.spellRounds?`拼读 1/${config.spellRounds}`:"准备回忆");
  for(let round=0;round<config.spellRounds;round++){
    updateStage(`拼读 ${round+1}/${config.spellRounds}`);
    if(!(await runOneSpellRound(item,round,config.spellRounds,token)))return;
  }
  if(!(await runRecallRounds(item,config.recallRounds,token)))return;
  if(!(await runRapid(item,config.flashCount,token)))return;
  await finishCurrentItem(token);
}

async function runOneSpellRound(item,round,total,token){
  const letters=[...item.word];
  for(let i=0;i<letters.length;i++){
    if(!(await gate(token)))return false;
    showLetters(item,letters.slice(0,i+1).join(""));playSound("beat");speakEN(letters[i],true);
    if(!(await stepDelay(CONFIG.letterMs,token)))return false;
  }
  if(!(await playReveal(item,token)))return false;
  state.pinned.push(round+1);rebuildPinned(item,total);return true;
}

async function finishCurrentItem(token){
  const entry=state.current;
  if(entry.kind==="review"){markReviewed(entry.item);state.completedReview++;}
  else if(entry.kind==="new"){markLearned(entry.item);state.completedNew++;}
  else state.completedRedo++;
  playSound("correct");state.queueIdx++;updateOverallProgress();

  const next=state.queue[state.queueIdx];
  if(entry.kind==="review"&&next?.kind==="new"){
    central.style.display="none";updateStage("复习完成");
    await playFeedback("review-done.mp3");if(!(await gate(token)))return;
    await playFeedback("new-words-start.mp3");if(!(await gate(token)))return;
  }else if(entry.kind==="new"&&state.completedNew%8===0&&state.completedNew<state.newCount){
    await playFeedback(`encourage-${Math.floor(Math.random()*5)+1}.mp3`);if(!(await gate(token)))return;
  }else if(!(await stepDelay(320,token)))return;
  runNextItem(token);
}

function runNextItem(token){
  if(token!==state.runToken||!state.active)return;
  if(state.queueIdx>=state.queue.length){finishSession(token);return;}
  state.current=state.queue[state.queueIdx];runCurrentItem(token);
}

async function startSession(mode="normal"){
  buildSession(mode); if(!state.queue.length){showWelcome();return;}
  welcomeOverlay.classList.remove("show");completeOverlay.classList.remove("show");
  ensureAudio();loadVoices();state.active=true;const token=++state.runToken;$("btnPause").textContent="暂停";$("btnPause").classList.add("primary");
  await playFeedback("welcome.mp3");if(!(await gate(token)))return;
  if(state.reviewCount){await playFeedback("review-start.mp3");if(!(await gate(token)))return;}
  else if(state.newCount){await playFeedback("new-words-start.mp3");if(!(await gate(token)))return;}
  runNextItem(token);
}

async function finishSession(token){
  if(token!==state.runToken)return;
  state.active=false;central.style.display="none";phaseLabel.textContent="";fillBar.style.width="100%";
  if(state.mode==="normal"&&state.completedNew>0){
    const day=progress.courseDay,allDone=(D30_PLAN[day]||[]).every(item=>progress.entries[item.id]);
    if(allDone&&!progress.dayCompletion[String(day)]){progress.dayCompletion[String(day)]=getToday();progress.lastAdvancedDate=getToday();saveStore();}
  }
  playSound("finish");showComplete();await playFeedback("complete.mp3");
}

function togglePause(){
  if(!state.current||welcomeOverlay.classList.contains("show")||completeOverlay.classList.contains("show"))return;
  ensureAudio();
  if(state.active){state.prePauseStage=state.stageText;state.active=false;pauseSpeech();$("btnPause").textContent="继续";$("btnPause").classList.remove("primary");statsEl.textContent="已暂停";}
  else{state.active=true;resumeSpeech();$("btnPause").textContent="暂停";$("btnPause").classList.add("primary");updateStage(state.prePauseStage||"继续学习");state.pauseWaiters.splice(0).forEach(fn=>fn());}
}

    <div class="complete-total">${redo?state.completedRedo:state.completedReview+state.completedNew}</div><div class="complete-caption">本次完成词次</div>
    <div class="stats-row">
      <div class="stat review"><div class="num">${state.completedReview}</div><div class="lbl">复习完成</div></div>
      <div class="stat new"><div class="num">${state.completedNew}</div><div class="lbl">新词完成</div></div>
    </div>
    <div class="motto">累计完成 ${totalLearned} 个课程条目。${!redo&&state.completedNew?"下一课程日将在明天解锁。":""}</div>
    <button class="secondary" onclick="showWelcome()">返回首页</button>
  </div>`;
  completeOverlay.classList.add("show");welcomeOverlay.classList.remove("show");
}

function resetAll(){
  if(!confirm("确定清除陈浩谦的全部学习和复习进度吗？"))return;
  invalidateRun();[STORE_KEY,"wordrain_day","wordrain_sr"].forEach(key=>localStorage.removeItem(key));progress=emptyStore();saveStore();showWelcome();
}

/* ---------------- Canvas word rain ---------------- */
const GOLDEN_ANGLE=Math.PI*(3-Math.sqrt(5));
const stars=Array.from({length:56},()=>({x:Math.random()*1600,y:Math.random()*1200,r:.35+Math.random()*1.1,vx:(Math.random()-.5)*.08,vy:(Math.random()-.5)*.08,phase:Math.random()*Math.PI*2}));

function rebuildPinned(item,total){
  state.instances=state.instances.filter(instance=>!instance.pinned);
  const count=state.pinned.length;if(!count)return;
  const maxEn=Math.min(74,W*.095),maxCn=Math.min(34,W*.044),rowH=Math.min(104,(H*.35)/Math.max(total,1));
  for(let i=0;i<count;i++){
    const recency=count-1-i,ratio=.58+.42*(i+1)/Math.max(total,1),y=H*.44-(recency+1)*rowH;
    state.instances.push({x:W/2-8,y:y-maxCn*.32,text:item.word,sz:maxEn*ratio,alpha:.92,align:"right",pinned:true,born:performance.now()});
    state.instances.push({x:W/2+8,y:y+maxEn*.25,text:item.cn,sz:maxCn*ratio,alpha:.68,align:"left",pinned:true,born:performance.now(),cn:true});
  }
}
function spawnBurst(x,y,count){
  for(let i=0;i<count;i++){const angle=Math.random()*Math.PI*2,speed=.8+Math.random()*2.6;state.instances.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,r:1+Math.random()*2.5,alpha:.75,burst:true,born:performance.now()});}
}
function textWidth(text,size,cn=false){
  ctx.save();ctx.font=`900 ${size}px ${cn?'"PingFang SC","Noto Sans SC",sans-serif':'"Arial Black","SF Pro Display",sans-serif'}`;
  const width=ctx.measureText(text).width;ctx.restore();return width;
}
function instanceBox(instance,padding=8){
  if(!instance.text)return null;
  const width=textWidth(instance.text,instance.sz,instance.cn),height=instance.sz*1.16;
  const left=instance.align==="right"?instance.x-width:instance.align==="left"?instance.x:instance.x-width/2;
  return {left:left-padding,right:left+width+padding,top:instance.y-height/2-padding,bottom:instance.y+height/2+padding,cx:left+width/2,cy:instance.y};
}
function overlapArea(a,b){
  const width=Math.max(0,Math.min(a.right,b.right)-Math.max(a.left,b.left));
  const height=Math.max(0,Math.min(a.bottom,b.bottom)-Math.max(a.top,b.top));
  return width*height;
}
function rapidGroupBox(item,x,y,enSize,cnSize,padding=18){
  const width=Math.max(textWidth(item.word,enSize),textWidth(item.cn,cnSize,true));
  const height=enSize+cnSize*1.65;
  return {left:x-width/2-padding,right:x+width/2+padding,top:y-height/2-padding,bottom:y+height/2+padding,cx:x,cy:y,width:width+padding*2,height:height+padding*2};
}
function chooseRapidPlacement(item,index,total,enSize,cnSize){
  const side=Math.max(36,W*.045),top=Math.max(88,H*.095),bottom=Math.max(92,H*.105);
  const occupied=[...state.rapidBoxes,...state.instances.filter(instance=>instance.pinned).map(instance=>instanceBox(instance,10)).filter(Boolean)];
  let best=null;
  for(let attempt=0;attempt<96;attempt++){
    const progress=total<=1?0:(index/(total-1));
    const desiredRing=.08+progress*.82;
    const ring=attempt<24?Math.min(1,desiredRing+(attempt%4)*.035):.08+((attempt*37)%83)/100;
    const angle=index*GOLDEN_ANGLE-.45+attempt*GOLDEN_ANGLE;
    const jitter=((attempt%7)-3)/30;
    const x=W/2+Math.cos(angle)*(W*.5-side)*(ring+jitter);
    const y=(top+H-bottom)/2+Math.sin(angle)*((H-bottom-top)*.5)*(ring-jitter*.6);
    const box=rapidGroupBox(item,x,y,enSize,cnSize);
    const outside=Math.max(0,side-box.left)+Math.max(0,box.right-(W-side))+Math.max(0,top-box.top)+Math.max(0,box.bottom-(H-bottom));
    const overlap=occupied.reduce((sum,other)=>sum+overlapArea(box,other),0);
    const separation=occupied.reduce((sum,other)=>sum+1/Math.max(40,Math.hypot(box.cx-other.cx,box.cy-other.cy)),0);
    const spreadPenalty=Math.abs(ring-desiredRing)*120;
    const score=outside*10000+overlap*20+separation*1000+spreadPenalty+attempt*.01;
    if(!best||score<best.score)best={x,y,box,score,overlap,outside};
    if(!outside&&!overlap)break;
  }
  return best;
}
function spawnRapidVisual(item,index,total){
  let enSize=Math.max(34,Math.min(82,W*.052+(index/Math.max(1,total-1))*22)),cnSize=Math.max(19,Math.min(36,enSize*.44));
  let placement=chooseRapidPlacement(item,index,total,enSize,cnSize);
  for(let shrink=0;shrink<5&&(placement.outside||placement.overlap);shrink++){
    enSize*=.9;cnSize*=.9;placement=chooseRapidPlacement(item,index,total,enSize,cnSize);
  }
  const {x,y,box}=placement;state.rapidBoxes.push(box);
  const born=performance.now(),rotation=item.word.length>9?0:(Math.random()-.5)*6;
  state.instances.push({x,y:y-cnSize*.58,text:item.word,sz:enSize,alpha:.94,rotation,flash:true,born});
  state.instances.push({x,y:y+cnSize*.72,text:item.cn,sz:cnSize,alpha:.72,rotation,flash:true,born,cn:true});
}

function render(){
  ctx.setTransform(DPR,0,0,DPR,0,0);ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
  const now=performance.now();
  for(const star of stars){star.x+=star.vx;star.y+=star.vy;if(star.x<0)star.x=W;if(star.x>W)star.x=0;if(star.y<0)star.y=H;if(star.y>H)star.y=0;star.phase+=.006;ctx.globalAlpha=.035+(Math.sin(star.phase)+1)*.025;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(star.x,star.y,star.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  state.instances=state.instances.filter(instance=>!instance.burst||now-instance.born<700);
  for(const instance of state.instances){
    if(instance.burst){const age=(now-instance.born)/700;instance.x+=instance.vx;instance.y+=instance.vy;ctx.globalAlpha=(1-age)*instance.alpha;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(instance.x,instance.y,instance.r,0,Math.PI*2);ctx.fill();continue;}
    const age=Math.min(1,(now-instance.born)/520),ease=1-Math.pow(1-age,3),scale=instance.flash?.68+.32*ease:1;
    ctx.save();ctx.globalAlpha=instance.alpha*Math.min(1,.25+age*1.6);ctx.translate(instance.x,instance.y);ctx.rotate((instance.rotation||0)*Math.PI/180);ctx.scale(scale,scale);
    if(instance.flash&&age<.5){ctx.shadowColor="#fff";ctx.shadowBlur=instance.sz*(1-age)*.55;}
    ctx.fillStyle="#fff";ctx.font=`900 ${instance.sz}px ${instance.cn?'"PingFang SC","Noto Sans SC",sans-serif':'"Arial Black","SF Pro Display",sans-serif'}`;ctx.textAlign=instance.align||"center";ctx.textBaseline="middle";ctx.fillText(instance.text,0,0);ctx.restore();
  }
  ctx.globalAlpha=1;requestAnimationFrame(render);
}

muteBtn.addEventListener("click",event=>{event.stopPropagation();ensureAudio();setMuted(!muted);if(!muted)playSound("click");});
$("btnPause").addEventListener("click",event=>{event.stopPropagation();togglePause();});
cv.addEventListener("click",togglePause);
document.addEventListener("keydown",event=>{if(event.code==="Space"){event.preventDefault();togglePause();}});

render();showWelcome();

</script>
